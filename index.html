<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boud Pricing Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --boud-magenta: #883f68;
      --boud-purple: #5e56de;
      --boud-orange: #e46a17;
      --boud-lime: #def763;
      --boud-light-gray: #f4f4f4;
      --boud-dark: #231F20;
      --text-white: #FFFFFF;
      --gray-text: #9A9A9A;
      --success: #4ADE80;
      --warning: #FBBF24;
      --error: #F87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--boud-light-gray); min-height: 100vh; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--boud-dark); color: white; padding: 20px; }
    .sidebar h1 { font-size: 20px; margin-bottom: 30px; color: var(--boud-lime); }
    .nav-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .nav-item:hover { background: rgba(255,255,255,0.1); }
    .nav-item.active { background: var(--boud-purple); }
    .main { flex: 1; padding: 30px; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; }
    .btn-primary { background: var(--boud-purple); color: white; }
    .btn-primary:hover { opacity: 0.9; }
    h2 { color: var(--boud-dark); margin-bottom: 20px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--boud-purple); }
    .stat-label { color: var(--gray-text); font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const App = () => {
      const [page, setPage] = React.useState('dashboard');
      
      React.useEffect(() => { lucide.createIcons(); }, [page]);
      
      return (
        <div className="app">
          <div className="sidebar">
            <h1>Boud Pricing</h1>
            <div className={"nav-item " + (page === 'dashboard' ? 'active' : '')} onClick={() => setPage('dashboard')}>
              <i data-lucide="layout-dashboard" style={{width:18,height:18}}></i> Dashboard
            </div>
            <div className={"nav-item " + (page === 'projects' ? 'active' : '')} onClick={() => setPage('projects')}>
              <i data-lucide="folder" style={{width:18,height:18}}></i> Projects
            </div>
            <div className={"nav-item " + (page === 'roles' ? 'active' : '')} onClick={() => setPage('roles')}>
              <i data-lucide="users" style={{width:18,height:18}}></i> Role Rates
            </div>
          </div>
          <div className="main">
            <div className="stats">
              <div className="stat-card">
                <div className="stat-value">12</div>
                <div className="stat-label">Active Projects</div>
              </div>
              <div className="stat-card">
                <div className="stat-value">$45,200</div>
                <div className="stat-label">Total Revenue</div>
              </div>
              <div className="stat-card">
                <div className="stat-value">89</div>
                <div className="stat-label">Roles Configured</div>
              </div>
              <div className="stat-card">
                <div className="stat-value">98%</div>
                <div className="stat-label">Approval Rate</div>
              </div>
            </div>
            <div className="card">
              <h2>Welcome to Boud Pricing Engine</h2>
              <p style={{color: 'var(--gray-text)', marginBottom: 20}}>
                This is a demo version. The full app includes: project management, role-based pricing with 89 roles across 12 departments, 
                enhanced role selector with search and department filters, VAT calculations, dark/light mode, and more.
              </p>
              <button className="btn btn-primary">Create New Project</button>
            </div>
          </div>
        </div>
      );
    };
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
